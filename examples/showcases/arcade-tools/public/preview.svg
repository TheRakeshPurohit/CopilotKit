/text><text x="64" y="84" fill="#334155" font-size="13" font-weight="500">me@example.com</text><text x="20" y="112" fill="#94a3b8" font-size="13">Subject</text><text x="80" y="112" fill="#334155" font-size="13" font-weight="500">Today&apos;s AI news  3 bullets</text></g><text x="600" y="612" fill="#94a3b8" font-size="14" text-anchor="middle">Arcade brokers the OAuth � CopilotKit renders it as generative UI � credentials never reach the LLM</text></svg>